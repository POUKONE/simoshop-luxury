<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SimoShop — Finaliser votre Commande</title>
    <style>
        :root {
            --ivory: #F9F6F2;
            --obsidian: #1A1A1A;
            --gold: #C5A059;
            --emerald: #25D366;
        }

        body {
            background-color: var(--ivory);
            color: var(--obsidian);
            font-family: 'Inter', sans-serif;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .checkout-card {
            background: #ffffff;
            width: 90%;
            max-width: 500px;
            padding: 50px;
            box-shadow: 0 30px 60px rgba(0,0,0,0.05);
            border-radius: 2px;
        }

        h1 {
            font-family: 'Playfair Display', serif;
            font-size: 2.2rem;
            font-weight: 300;
            margin-bottom: 40px;
            border-bottom: 1px solid rgba(26,26,26,0.1);
            padding-bottom: 20px;
        }

        .instruction {
            font-size: 0.8rem;
            color: #888;
            margin-bottom: 30px;
            line-height: 1.6;
        }

        .form-group {
            margin-bottom: 25px;
        }

        label {
            display: block;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-bottom: 10px;
            color: var(--gold);
        }

        input {
            width: 100%;
            padding: 15px;
            border: 1px solid #eee;
            background: #fafafa;
            font-family: inherit;
            outline: none;
            transition: border-color 0.3s;
        }

        input:focus {
            border-color: var(--gold);
        }

        .payment-methods {
            display: flex;
            gap: 15px;
            margin-top: 10px;
        }

        .method-badge {
            font-size: 0.65rem;
            padding: 5px 10px;
            border: 1px solid #ddd;
            border-radius: 20px;
            color: #666;
        }

        .btn-whatsapp {
            width: 100%;
            background-color: var(--emerald);
            color: white;
            border: none;
            padding: 18px;
            font-size: 0.85rem;
            letter-spacing: 1px;
            font-weight: 600;
            text-transform: uppercase;
            cursor: pointer;
            margin-top: 20px;
            transition: opacity 0.3s;
        }

        .btn-whatsapp:hover {
            opacity: 0.9;
        }

        .footer-note {
            text-align: center;
            font-size: 0.7rem;
            color: #aaa;
            margin-top: 30px;
        }
    </style>
</head>
<body>

    <div class="checkout-card">
        <h1>Finalisation</h1>
        <p class="instruction">
            Veuillez remplir vos informations. Une fois validé, vous serez redirigé vers notre service client WhatsApp pour finaliser le dépôt Mobile Money et confirmer votre livraison.
        </p>

        <div class="form-group">
            <label>Nom complet</label>
            <input type="text" placeholder="Ex: Aminata Koné">
        </div>

        <div class="form-group">
            <label>Numéro de téléphone</label>
            <input type="tel" placeholder="+227 -- -- -- --">
        </div>

        <div class="form-group">
            <label>Modes de paiement acceptés</label>
            <div class="payment-methods">
                <span class="method-badge">Orange Money</span>
                <span class="method-badge">MTN MoMo</span>
            </div>
        </div>

        <button class="btn-whatsapp">Commander via WhatsApp</button>
        
        <div class="footer-note">
            Paiement 100% sécurisé via Mobile Money.
        </div>
    </div>

</body>
</html>
